substitutions:
  friendly_name: "Anenji 6.2KW 48V Hybrid Solar Inverter"
  name_model: "anenji62"
  name: Inverter
  device_description: "Monitor and control an Anenji 6.2kW inverter via RS232"
  tx_pin: GPIO13
  rx_pin: GPIO12

api:
  encryption:
    key: !secret anenji62_api_key
ota:
  - platform: esphome
    password: !secret anenji62__ota_password

esp8266:
  board: d1_mini

esphome:
  name: ${name_model}
  comment: ${device_description}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  project:
    name: "syssi.esphome-smg-ii"
    version: 1.2.0

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password  

logger:

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}

modbus:
  - id: modbus0
    uart_id: uart_0
    send_wait_time: 200ms

modbus_controller:
  - id: smg0
    address: 0x01
    modbus_id: modbus0
    command_throttle: 200ms
    update_interval: 20s

time:
  - platform: sntp

sensor:
  - platform: total_daily_energy
    name: "Battery Discharged Today"
    restore: true
    device_class: energy
    power_id: smg0_discharging_power
    filters:
      # Multiplication factor from W to kW is 0.001
      - multiply: 0.001
    unit_of_measurement: kWh

  - platform: total_daily_energy
    name: "Battery Charged Today"
    restore: true
    device_class: energy
    power_id: smg0_charging_power
    filters:
      # Multiplication factor from W to kW is 0.001
      - multiply: 0.001
    unit_of_measurement: kWh

  - platform: template
    name: "Battery Discharging Power"
    id: smg0_discharging_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:battery-arrow-down
    # Gets updated on value of smg0_battery_average_power
    update_interval: never
    lambda: |-
      if (isnan(id(smg0_battery_average_power).state)) {
        return {};
      }
      auto power = id(smg0_battery_average_power).state;
      return (power < 0.0f) ? -power : 0.0f;

  - platform: template
    name: "Battery Charging Power"
    id: smg0_charging_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:battery-charging
    # Gets updated on value of smg0_battery_average_power
    update_interval: never
    lambda: |-
      if (isnan(id(smg0_battery_average_power).state)) {
        return {};
      }
      auto power = id(smg0_battery_average_power).state;
      return (power > 0.0f) ? power : 0.0f;


  # Effective mains voltage                              0.1V     Int   202 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "AC Input Voltage"
    address: 202
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Mains Frequency                                      0.01Hz   Int   203 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "AC Input Frequency"
    address: 203
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  # Average mains power                                  1W       Int   204 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "AC Input Power"
    address: 204
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Effective inverter voltage                           0.1V     Int   205 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Inverter Voltage"
    disabled_by_default: true
    entity_category: diagnostic
    address: 205
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Effective inverter current                           0.1A     Int   206 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Inverter Current"
    disabled_by_default: true
    entity_category: diagnostic
    address: 206
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Inverter frequency                                   0.01Hz   Int   207 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Inverter Frequency"
    disabled_by_default: true
    entity_category: diagnostic
    address: 207
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  # Average inverter power                               1W       Int   208 1 R Positive numbers indicate inverter output, negative numbers indicate inverter input
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Inverter Power"
    disabled_by_default: true
    entity_category: diagnostic
    address: 208
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Inverter charging power                              1W       Int   209 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Inverter Charging Power"
    disabled_by_default: true
    entity_category: diagnostic
    address: 209
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:battery-charging

  # Output effective voltage                             0.1V     Int   210 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Voltage"
    address: 210
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Output effective Current                             0.1A     Int   211 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Current"
    address: 211
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Output frequency                                     0.01Hz   Int   212 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Frequency"
    address: 212
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  # Output active power                                  1W       Int   213 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Active Power"
    address: 213
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Output apparent power                                1VA      Int   214 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Apparent Power"
    disabled_by_default: true
    entity_category: diagnostic
    address: 214
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "VA"
    device_class: apparent_power
    state_class: measurement
    accuracy_decimals: 0

  # Battery average voltage                              0.1V     Int   215 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Battery Voltage"
    address: 215
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    icon: mdi:current-dc
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Battery average Current                              0.1A     Int   216 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Battery Current"
    address: 216
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:current-dc
    filters:
      - multiply: 0.1

  # Battery average power                                1W       Int   217 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Battery Power"
    id: smg0_battery_average_power
    address: 217
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    on_value:
      - component.update: smg0_discharging_power
      - component.update: smg0_charging_power

  # PV average voltage                                   0.1V     Int   219 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "PV Voltage"
    address: 219
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:solar-power
    filters:
      - multiply: 0.1

  # PV average current                                   0.1A     Int   220 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "PV Current"
    address: 220
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:solar-power
    filters:
      - multiply: 0.1

  # PV average power                                     1W       Int   223 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    id: smg0_pv_average_power
    name: "PV Power"
    address: 223
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:solar-power

  # PV charging average power                            1W       Int   224 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "PV Charging Power"
    address: 224
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:solar-power

  # Load percentage                                      1%       Int   225 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Load Percentage"
    address: 225
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:percent

  # DCDC Temperature                                     1°C      Int   226 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "DC-DC Temperature"
    entity_category: diagnostic
    address: 226
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0

  # Inverter Temperature                                 1°C      Int   227 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Inverter Temperature"
    entity_category: diagnostic
    address: 227
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0

  # PV temperature                                       1°C      Int   228 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "PV Temperature"
    entity_category: diagnostic
    address: 228
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0

  # Battery state of charge                              1%       UInt  229 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Battery SOC"
    address: 229
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0

  # Power flow status                                     --       UInt  231 1 R
  # bit0~1 0: PV is not connected to the system          1: PV is connected to the system
  # bit2~3 0: Mains power is not connected to the system 1: Mains power is connected to the system  2: Inverter is connected to the grid
  # bit4~5 0: Battery neither charged nor discharged     1: Battery charging 2: Battery discharging
  # bit6~7 0: The system does not output load            1: The system outputs load
  # bit8   0: Not charged by AC power                    1: Charged by AC power
  # bit9   0: PV not charging                            1: PV charging
  # bit10  0: Battery icon on                            1: Battery icon off
  # bit11  0: PV icon is on                              1: PV icon is off
  # bit12  0: Mains icon is on                           1: Mains icon is off
  # bit13  0: Load icon is on                            1: Load icon is off
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Power Flow Flags"
    disabled_by_default: true
    entity_category: diagnostic
    address: 231
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0
    icon: mdi:transmission-tower

  # Battery average current                              0.1A     Int   232 1 R Positive number means charging, negative number means discharging
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Battery Signed Current"
    disabled_by_default: true
    entity_category: diagnostic
    address: 232
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:current-dc
    filters:
      - multiply: 0.1

  # Inverter charging average current                    0.1A     Int   233 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Inverter Charging Current"
    disabled_by_default: true
    entity_category: diagnostic
    address: 233
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:current-dc
    filters:
      - multiply: 0.1

  # PV charging average current                          0.1A     Int   234 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "PV Charging Current"
    disabled_by_default: true
    entity_category: diagnostic
    address: 234
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:solar-power
    filters:
      - multiply: 0.1

  # External CT sampling power                             1W       Int   235 2 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "External CT Power"
    disabled_by_default: true
    entity_category: diagnostic
    address: 235
    register_type: holding
    value_type: S_DWORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Power generation on the day                            0.01Kwh  Uint   443 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "PV Energy Today"
    address: 443
    register_type: holding
    skip_updates: 14
    value_type: U_WORD
    unit_of_measurement: "kWh"
    icon: mdi:solar-power
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

  ## Rated power                                           W       Uint  643 1 R
  # - platform: modbus_controller
  #   modbus_controller_id: smg0
  #   name: "rated power"
  #   address: 643
  #   register_type: holding
  #   value_type: U_WORD
  #   unit_of_measurement: "W"
  #   device_class: power
  #   # state_class: measurement
  #   accuracy_decimals: 0

  ## Rated number of battery cells [J]                                          PCS       Uint  644 1 R
  # - platform: modbus_controller
  #   modbus_controller_id: smg0
  #   name: "rated number of battery cells "
  #   address: 644
  #   register_type: holding
  #   value_type: U_WORD
  #   unit_of_measurement: "PCS"
  #   # state_class: measurement
  #   accuracy_decimals: 0

select:
  # Output Mode                                                   Uint  300 1 R/W 0: Single, 1: Parallel, 2: 3 Phase-P1, 3: 3 Phase-P2, 4: 3 Phase-P3
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Mode"
    disabled_by_default: true
    use_write_multiple: true
    address: 300
    value_type: U_WORD
    icon: mdi:view-parallel
    entity_category: config
    optionsmap:
      "Single": 0
      "Parallel": 1
      "Phase P1": 2
      "Phase P2": 3
      "Phase P3": 4

  # Output priority                                               Uint  301 1 R/W
  # Manual-backed mapping:
  # 0: Utility first, 1: Solar first, 2: SBU priority, 3: SUB priority, 4: SUF priority
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Priority"
    use_write_multiple: true
    address: 301
    value_type: U_WORD
    icon: mdi:priority-high
    entity_category: config
    optionsmap:
      "Utility First (UTI)": 0
      "Solar First (SOL)": 1
      "SBU": 2
      "SUB": 3
      "SUF": 4

  # Input voltage range                                           Uint  302 1 R/W 0: Wide range, 1: Narrow range
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "AC Input Range"
    use_write_multiple: true
    address: 302
    value_type: U_WORD
    icon: mdi:transmission-tower-import
    entity_category: config
    optionsmap:
      "Appliances (90-280)": 0
      "UPS (170-280)": 1
      "Generator (170-280)": 2

  # Buzzer mode                                                   Uint  303 1 R/W 0: Mute in all situations, 1: Sound when the input source is changed or there is a specific warning or fault, 2: Sound when there is aspecific warning or fault, 3: Sound when fault occurs
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Buzzer Mode"
    use_write_multiple: true
    address: 303
    value_type: U_WORD
    icon: mdi:bullhorn
    entity_category: config
    optionsmap:
      "Silent": 0
      "Beep on input source changes, warnings and faults": 1
      "Beep on warnings and faults": 2
      "Beep on faults": 3

  # Battery Type                                                 Uint  322 1 R/W
  # Manual-backed values kept; undocumented Li3/Li4 removed from UI
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Battery Type"
    use_write_multiple: true
    address: 322
    value_type: U_WORD
    icon: mdi:ethernet
    entity_category: config
    optionsmap:
      "AGM": 0
      "FLD": 1
      "User Defined": 2
      #"Li1": 3
      "Li2 (Pylontech)": 4
      #"Li3": 5  # FOX ESS
      "Li4 (Growatt)": 6
      "Lib (Lithium without communication)": 8

  # Battery charging priority                                     Uint  331 1 R/W
  # Manual-backed mapping:
  # 1: Solar first, 2: Solar and Utility, 3: Only Solar
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Charge Source Priority"
    use_write_multiple: true
    address: 331
    value_type: U_WORD
    icon: mdi:battery-charging
    entity_category: config
    optionsmap:
      "Solar first": 1
      "Solar and Utility": 2
      "Only Solar": 3

  # Turn on mode                                                  Uint  406 1 R/W 0: Can be turn-on locally or remotely, 1: Only local turn-on, 2: Only remote turn-on
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Remote Turn-On Mode"
    disabled_by_default: true
    use_write_multiple: true
    address: 406
    value_type: U_WORD
    icon: mdi:remote
    entity_category: config
    optionsmap:
      "Local and remotely turn-on allowed": 0
      "Local turn-on only": 1
      "Remote turn-on only": 2
      
  # Output voltage selector
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Voltage"
    address: 320
    value_type: U_WORD
    use_write_multiple: true
    optionsmap:
      "220 V": 2200
      "230 V": 2300
      "240 V": 2400
    entity_category: config
    icon: mdi:sine-wave

  # Output frequency selector
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Output Frequency Setting"
    address: 321
    value_type: U_WORD
    use_write_multiple: true
    optionsmap:
      "50 Hz": 5000
      "60 Hz": 6000
    entity_category: config
    icon: mdi:current-ac

switch:
  # LCD automatically returns to the homepage                     Uint  306 1 R/W 0: Do not return automatically, 1: Automatically return after 1 minute
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Display Auto Return"
    use_write_multiple: true
    address: 306
    register_type: holding
    bitmask: 1
    entity_category: config
    icon: mdi:monitor-dashboard

  # LCD Backlight Always On
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "LCD Backlight Always On"
    use_write_multiple: true
    address: 305
    register_type: holding
    bitmask: 1
    icon: mdi:lightbulb-auto

  # Energy-saving mode                                            Uint  307 1 R/W 0: Energy-saving mode is off, 1: Energy-saving mode is on
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Eco Mode"
    use_write_multiple: true
    address: 307
    register_type: holding
    bitmask: 1
    icon: mdi:leaf

  # Overload automatic restart                                    Uint  308 1 R/W 0: Overload failure will not restart, 1: Automatic restart after overload failure
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Restart on Overload"
    use_write_multiple: true
    address: 308
    register_type: holding
    bitmask: 1
    icon: mdi:restart-alert

  # Over temperature automatic restart                            Uint  309 1 R/W 0: Over temperature failure will not restart, 1: Automatic restart after over-temperature fault
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Restart on Overtemperature"
    use_write_multiple: true
    address: 309
    register_type: holding
    bitmask: 1
    icon: mdi:restart-alert

  # Overload transfer to bypass enabled                           Uint  310 1 R/W 0: Disable, 1: Enable
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Bypass on Overload"
    use_write_multiple: true
    address: 310
    register_type: holding
    bitmask: 1
    icon: mdi:transit-connection-variant

  # Parallel PV detection mode                                   Uint  311 1 R/W 0: Disable, 1: Enable
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "Parallel PV Detection"
    disabled_by_default: true
    use_write_multiple: true
    address: 311
    register_type: holding
    bitmask: 1
    icon: mdi:solar-power-variant

  # External CT Enable                                           Uint  312 1 R/W 0: Disable, 1: Enable
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "External CT Enabled"
    disabled_by_default: true
    use_write_multiple: true
    address: 312
    register_type: holding
    bitmask: 1
    icon: mdi:meter-electric

  # Battery Eq mode is enabled                                    Uint  313 1 R/W 0: Disable, 1: Enable
  - platform: modbus_controller
    modbus_controller_id: smg0
